<section id="projects" class="min-h-screen bg-black text-white py-20">
  <h2 class="text-4xl text-center mb-12">Projects</h2>

  <div class="grid md:grid-cols-2 gap-8 px-10">
    <div
      *ngFor="let project of projects"
      class="p-6 bg-gray-800 rounded-lg hover:scale-105 transition"
    >
      <h3 class="text-2xl font-bold">{{ project.name }}</h3>
      <p class="mt-2 text-sm opacity-70">{{ project.tech }}</p>
      <p class="mt-4">{{ project.desc }}</p>
    </div>
  </div>
</section>
